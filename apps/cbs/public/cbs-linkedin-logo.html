<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; align-items: center; justify-content: center; width: 400px; height: 400px; }
  .logo { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .wordmark { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .name { font-family: Arial Black, Arial, sans-serif; font-weight: 900; font-size: 38px; letter-spacing: 2px; color: #1a2030; line-height: 1; }
  .sub { font-family: Arial, sans-serif; font-weight: 600; font-size: 18px; letter-spacing: 8px; color: #1a2030; opacity: 0.55; text-transform: uppercase; }
</style>
</head>
<body>
<div class="logo">
  <svg width="180" height="180" viewBox="0 0 40 40" fill="none">
    <path d="M2 36 L22 36 L26 28 L6 28 Z" fill="#2196F3" opacity="0.32" />
    <path d="M7 26 L27 26 L31 18 L11 18 Z" fill="#2196F3" opacity="0.62" />
    <path d="M12 16 L32 16 L36 8 L16 8 Z" fill="#2196F3" />
  </svg>
  <div class="wordmark">
    <div class="name">CLOUD BASE</div>
    <div class="sub">SOLUTIONS</div>
  </div>
</div>
</body>
</html>
